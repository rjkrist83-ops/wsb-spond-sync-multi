name: Spond Sync Multi

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install spond

      - name: Run sync
        env:
          SPOND_EMAIL_U12: ${{ secrets.SPOND_EMAIL_U12 }}
          SPOND_PASSWORD_U12: ${{ secrets.SPOND_PASSWORD_U12 }}
          SPOND_GROUP_ID_U12: ${{ secrets.SPOND_GROUP_ID_U12 }}

          SPOND_EMAIL_U15: ${{ secrets.SPOND_EMAIL_U15 }}
          SPOND_PASSWORD_U15: ${{ secrets.SPOND_PASSWORD_U15 }}
          SPOND_GROUP_ID_U15: ${{ secrets.SPOND_GROUP_ID_U15 }}
        run: |
          python sync_spond.py

      - name: Commit feeds
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add feeds/*.json
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Update Spond feeds"
          git push
